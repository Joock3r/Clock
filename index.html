<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קרא את השעון</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════
       CSS VARIABLES — DARK (default)
       ══════════════════════════════ */
    :root, [data-theme="dark"] {
      --bg-body:        #060b18;
      --bg-dot:         #00d4ff07;
      --bg-grad:        radial-gradient(ellipse at 20% 10%, #0d1f3a 0%, #060b18 55%, #08101f 100%);
      --ambient:        radial-gradient(ellipse, #00d4ff05 0%, transparent 70%);

      --card-bg:        linear-gradient(145deg, #0c1428f0, #090f22f0);
      --card-border:    #00d4ff1a;
      --card-shadow:    0 32px 80px #00000088, inset 0 1px 0 #ffffff08;

      --title-label:    #00d4ff66;
      --title-main:     #ddeeff;

      --hint-color:     #4a6690;
      --hint-mono:      #00d4ff66;

      --input-bg:       #08101e;
      --input-border:   #00d4ff22;
      --input-focus:    #00d4ff55;
      --input-glow:     #00d4ff11;
      --input-color:    #e0f0ff;

      --btn-bg:         linear-gradient(135deg, #00c8f0, #0082cc);
      --btn-color:      #030810;
      --btn-shadow:     0 6px 28px #00d4ff2a;
      --btn-shadow-h:   0 8px 36px #00d4ff44;

      --waiting-title:  #c0d8ff;
      --waiting-sub:    #405878;
      --countdown:      #00d4ff;
      --countdown-glow: #00d4ff66;

      --result-detail:  #5a7a99;
      --result-footer:  #2a4060;

      --stat-card-bg:   linear-gradient(135deg, #0d1530ee, #111b3aee);
      --stat-label:     #5a7299;

      --page-footer:    #1a2d48;
      --loading-color:  #2a4060;
      --spinner-track:  #00d4ff22;
      --spinner-tip:    #00d4ff;

      --clock-face:     #0a0f1e;
      --clock-face-g1:  #0d1530;
      --clock-face-g2:  #060b18;
      --clock-border:   #00d4ff;
      --clock-tick-min: #ffffff1a;
      --clock-tick-hr:  #00d4ff;
      --clock-nums:     #a8d8ff;
      --clock-hand-h:   #ffffff;
      --clock-hand-m:   #00d4ff;
      --clock-center:   #00d4ff;
      --clock-cap:      #060b18;
      --clock-shadow:   drop-shadow(0 0 28px #00d4ff55);
      --clock-glow-bg:  radial-gradient(circle, #00d4ff06, transparent 65%);

      --theme-btn-bg:       #0d1a30;
      --theme-btn-border:   #00d4ff22;
      --theme-btn-color:    #a0c4e8;
      --theme-btn-hover-bg: #162340;
    }

    /* ══════════════════════════════
       CSS VARIABLES — LIGHT
       ══════════════════════════════ */
    [data-theme="light"] {
      --bg-body:        #f0f4fb;
      --bg-dot:         #0077aa0d;
      --bg-grad:        radial-gradient(ellipse at 20% 10%, #ddeeff 0%, #f0f4fb 55%, #e8f0fa 100%);
      --ambient:        radial-gradient(ellipse, #0077aa08 0%, transparent 70%);

      --card-bg:        linear-gradient(145deg, #ffffffee, #f4f8ffee);
      --card-border:    #0088cc22;
      --card-shadow:    0 16px 60px #0000001a, inset 0 1px 0 #ffffff88;

      --title-label:    #0077aaaa;
      --title-main:     #112244;

      --hint-color:     #5577aa;
      --hint-mono:      #0077aaaa;

      --input-bg:       #f8faff;
      --input-border:   #0088cc33;
      --input-focus:    #0088cc88;
      --input-glow:     #0088cc14;
      --input-color:    #112244;

      --btn-bg:         linear-gradient(135deg, #0099dd, #0066bb);
      --btn-color:      #ffffff;
      --btn-shadow:     0 6px 28px #0088cc33;
      --btn-shadow-h:   0 8px 36px #0088cc55;

      --waiting-title:  #112244;
      --waiting-sub:    #5577aa;
      --countdown:      #0077cc;
      --countdown-glow: #0077cc44;

      --result-detail:  #4466aa;
      --result-footer:  #8899bb;

      --stat-card-bg:   linear-gradient(135deg, #ffffffee, #eef3ffee);
      --stat-label:     #7788aa;

      --page-footer:    #aabbcc;
      --loading-color:  #7799bb;
      --spinner-track:  #0088cc22;
      --spinner-tip:    #0088cc;

      --clock-face:     #f8fbff;
      --clock-face-g1:  #eef4ff;
      --clock-face-g2:  #f8fbff;
      --clock-border:   #0088cc;
      --clock-tick-min: #00000018;
      --clock-tick-hr:  #0088cc;
      --clock-nums:     #1155aa;
      --clock-hand-h:   #112244;
      --clock-hand-m:   #0088cc;
      --clock-center:   #0088cc;
      --clock-cap:      #f8fbff;
      --clock-shadow:   drop-shadow(0 4px 18px #0088cc33);
      --clock-glow-bg:  radial-gradient(circle, #0088cc08, transparent 65%);

      --theme-btn-bg:       #ffffff;
      --theme-btn-border:   #0088cc33;
      --theme-btn-color:    #446688;
      --theme-btn-hover-bg: #eef4ff;
    }

    /* ══════════════════ BASE ══════════════════ */
    body {
      min-height: 100vh;
      background: var(--bg-body);
      font-family: 'Heebo', sans-serif;
      direction: rtl;
      overflow-x: hidden;
      transition: background 0.35s ease;
    }

    #app {
      min-height: 100vh;
      background-image:
        radial-gradient(circle, var(--bg-dot) 1px, transparent 1px),
        var(--bg-grad);
      background-size: 30px 30px, 100% 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      position: relative;
      transition: background-image 0.35s ease;
    }

    .ambient-top {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 220px;
      background: var(--ambient);
      pointer-events: none;
      animation: glowPulse 4s ease infinite;
    }

    /* ── Theme toggle ── */
    #themeToggle {
      position: fixed;
      top: 16px; left: 16px;
      display: flex; align-items: center; gap: 7px;
      background: var(--theme-btn-bg);
      border: 1px solid var(--theme-btn-border);
      border-radius: 20px;
      padding: 7px 14px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px; font-weight: 600;
      color: var(--theme-btn-color);
      cursor: pointer;
      box-shadow: 0 2px 12px #00000018;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.1s;
      z-index: 100;
    }
    #themeToggle:hover {
      background: var(--theme-btn-hover-bg);
      transform: translateY(-1px);
    }
    #themeToggle:active { transform: scale(0.96); }
    #themeToggle .toggle-icon { font-size: 16px; transition: transform 0.4s ease; }
    #themeToggle:hover .toggle-icon { transform: rotate(20deg); }

    /* ── Title ── */
    .title-wrap { text-align: center; margin-bottom: 24px; }
    .title-label {
      font-size: 11px; font-weight: 700;
      color: var(--title-label); letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 8px;
      transition: color 0.35s;
    }
    .title-main {
      font-size: 28px; font-weight: 900;
      color: var(--title-main); letter-spacing: -0.5px;
      transition: color 0.35s;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%; max-width: 400px;
      box-shadow: var(--card-shadow);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease,
                  background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }
    .card.visible { opacity: 1; transform: translateY(0); }

    /* ── Clock wrapper ── */
    .clock-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .clock-glow {
      position: absolute;
      inset: -16px; border-radius: 50%;
      background: var(--clock-glow-bg);
      animation: glowPulse 3s ease infinite;
      transition: background 0.35s;
    }

    /* ── Input ── */
    .input-hint {
      font-size: 13px; color: var(--hint-color);
      text-align: center; margin-bottom: 12px;
      transition: color 0.35s;
    }
    .input-hint span { font-family: 'Space Mono', monospace; color: var(--hint-mono); font-size: 12px; }

    #timeInput {
      width: 100%;
      background: var(--input-bg);
      border: 2px solid var(--input-border);
      border-radius: 14px;
      color: var(--input-color);
      font-size: 32px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      text-align: center;
      padding: 14px;
      letter-spacing: 6px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.35s, color 0.35s;
      direction: ltr;
      display: block;
      margin-bottom: 18px;
    }
    #timeInput:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px var(--input-glow);
    }
    #timeInput.error {
      border-color: #ff446688 !important;
      box-shadow: 0 0 0 3px #ff446622 !important;
      animation: shake 0.42s ease;
    }

    /* ── Submit btn ── */
    .btn-submit {
      width: 100%;
      background: var(--btn-bg);
      color: var(--btn-color);
      font-family: 'Heebo', sans-serif;
      font-size: 16px; font-weight: 800;
      padding: 15px; border-radius: 14px;
      letter-spacing: 0.5px;
      border: none; cursor: pointer;
      box-shadow: var(--btn-shadow);
      transition: transform 0.12s, box-shadow 0.12s, background 0.35s;
    }
    .btn-submit:hover { box-shadow: var(--btn-shadow-h); transform: translateY(-1px); }
    .btn-submit:active { transform: scale(0.97) translateY(1px); }

    /* ── Loading ── */
    .loading-wrap { text-align: center; padding: 48px 0; color: var(--loading-color); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--spinner-track);
      border-top: 3px solid var(--spinner-tip);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }
    .loading-text { font-size: 15px; }

    /* ── Waiting ── */
    .waiting-wrap { text-align: center; }
    .waiting-emoji { font-size: 52px; margin-bottom: 16px; }
    .waiting-title { font-size: 20px; font-weight: 800; color: var(--waiting-title); margin-bottom: 8px; transition: color 0.35s; }
    .waiting-sub { font-size: 14px; color: var(--waiting-sub); margin-bottom: 24px; transition: color 0.35s; }
    .countdown {
      font-family: 'Space Mono', monospace;
      font-size: 38px; font-weight: 700;
      color: var(--countdown); letter-spacing: 4px;
      text-shadow: 0 0 20px var(--countdown-glow);
      transition: color 0.35s;
    }

    /* ── Result ── */
    .result-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .result-emoji {
      font-size: 68px; line-height: 1;
      opacity: 0;
      animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1) 0.05s forwards;
    }
    .result-emoji.correct { filter: drop-shadow(0 0 24px #00ff8888); }
    .result-emoji.wrong   { filter: drop-shadow(0 0 24px #ff446688); }
    .result-text { text-align: center; opacity: 0; animation: fadeUp 0.4s ease 0.2s forwards; }
    .result-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .result-title.correct { color: #00bb66; }
    .result-title.wrong   { color: #ee4466; }
    .result-detail { font-size: 14px; color: var(--result-detail); line-height: 1.9; transition: color 0.35s; }
    .result-detail .mono { font-family: 'Space Mono', monospace; font-size: 15px; }
    .result-detail .mono.correct { color: var(--countdown); }
    .result-detail .mono.wrong   { color: #ff6680; }
    .streak-badge {
      background: #ff8c0011; border: 1px solid #ff8c0033;
      border-radius: 10px; padding: 10px 20px;
      font-size: 14px; color: #ff9c20; font-weight: 700;
      opacity: 0; animation: fadeUp 0.4s ease 0.35s forwards;
    }
    .best-badge {
      font-size: 13px; color: #ffd700; font-weight: 700;
      text-shadow: 0 0 12px #ffd70066;
      opacity: 0; animation: fadeUp 0.4s ease 0.45s forwards;
    }
    .result-footer { font-size: 12px; color: var(--result-footer); margin-top: 4px; transition: color 0.35s; }

    /* ── Stats bar ── */
    .stats-bar { display: flex; gap: 8px; width: 100%; max-width: 400px; margin-top: 14px; }
    .stat-card {
      background: var(--stat-card-bg);
      border-radius: 12px; padding: 14px 10px;
      text-align: center; flex: 1; min-width: 72px;
      transition: background 0.35s, border-color 0.35s;
    }
    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 20px; font-weight: 700;
      line-height: 1; margin-bottom: 6px;
    }
    .stat-label { font-size: 10px; color: var(--stat-label); line-height: 1.3; transition: color 0.35s; }

    .page-footer { margin-top: 16px; font-size: 11px; color: var(--page-footer); text-align: center; transition: color 0.35s; }
    .playing-wrap { display: flex; flex-direction: column; align-items: center; gap: 22px; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0%   { transform: scale(0.6); opacity: 0; }
      65%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      18%  { transform: translateX(-9px); }
      36%  { transform: translateX(9px); }
      54%  { transform: translateX(-5px); }
      72%  { transform: translateX(5px); }
    }
    @keyframes glowPulse {
      0%,100% { opacity: 0.5; }
      50%     { opacity: 1; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">
  <div class="ambient-top"></div>

  <!-- Theme toggle -->
  <button id="themeToggle" onclick="toggleTheme()" aria-label="החלף מצב תצוגה">
    <span class="toggle-icon" id="themeIcon">☀️</span>
    <span id="themeLabel">מצב בהיר</span>
  </button>

  <!-- Title -->
  <div class="title-wrap">
    <div class="title-label">⏱ אתגר יומי</div>
    <h1 class="title-main">קרא את השעון</h1>
  </div>

  <!-- Card -->
  <div class="card" id="card">

    <div id="state-loading">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">טוען...</div>
      </div>
    </div>

    <div id="state-waiting" style="display:none;">
      <div class="waiting-wrap">
        <div class="waiting-emoji">🌙</div>
        <div class="waiting-title">כבר שיחקת היום!</div>
        <div class="waiting-sub">חזור בעוד</div>
        <div class="countdown" id="countdown">00:00:00</div>
      </div>
    </div>

    <div id="state-playing" style="display:none;">
      <div class="playing-wrap">
        <div class="clock-wrap">
          <div class="clock-glow"></div>
          <svg id="clockSvg" width="260" height="260"></svg>
        </div>
        <div style="width:100%">
          <div class="input-hint">הזן את השעה המוצגת (לדוגמה: <span>12:23</span>)</div>
          <input type="text" id="timeInput" placeholder="__:__" maxlength="5" autocomplete="off" />
          <button class="btn-submit" onclick="handleSubmit()">אשר תשובה ✓</button>
        </div>
      </div>
    </div>

    <div id="state-result" style="display:none;">
      <div class="result-wrap">
        <div class="result-emoji" id="resultEmoji"></div>
        <div class="result-text">
          <div class="result-title" id="resultTitle"></div>
          <div class="result-detail" id="resultDetail"></div>
        </div>
        <div class="streak-badge" id="streakBadge" style="display:none;"></div>
        <div class="best-badge"   id="bestBadge"   style="display:none;"></div>
        <div class="result-footer">המשחק הבא יהיה זמין בעוד 24 שעות</div>
      </div>
    </div>

  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="visibility:hidden;">
    <div class="stat-card" style="border:1px solid #ff8c0033;">
      <div class="stat-value" style="color:#ff8c00;" id="stat-streak">0</div>
      <div class="stat-label">🔥 רצף נוכחי</div>
    </div>
    <div class="stat-card" style="border:1px solid #ffd70033;">
      <div class="stat-value" style="color:#ffd700;" id="stat-best">0</div>
      <div class="stat-label">👑 שיא רצף</div>
    </div>
    <div class="stat-card" style="border:1px solid #0088cc33;">
      <div class="stat-value" style="color:#0088cc;" id="stat-total">0</div>
      <div class="stat-label">משחקים</div>
    </div>
    <div class="stat-card" style="border:1px solid #00aa6633;">
      <div class="stat-value" style="color:#00aa66;" id="stat-rate">0%</div>
      <div class="stat-label">% הצלחה</div>
    </div>
  </div>

  <div class="page-footer">משחק שהתחיל ולא הושלם נספר ככישלון</div>
</div>

<script>
// ── Theme ──
const THEME_KEY  = 'clock_game_theme';
const STORAGE_KEY = 'clock_game_v1';
const COOLDOWN_MS = 24 * 60 * 60 * 1000;

let isDark = localStorage.getItem(THEME_KEY) !== 'light';

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeIcon').textContent  = isDark ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = isDark ? 'מצב בהיר' : 'מצב כהה';
  // Redraw clock with new palette if in game
  if (currentClock) drawClock(currentClock.hour, currentClock.minute);
}

function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
  applyTheme();
}

// ── Helpers ──
function getVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// ── Storage ──
function loadStats() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch {}
  return { streak:0, bestStreak:0, totalGames:0, successCount:0, lastGameTimestamp:null, pendingGame:null };
}
function saveStats(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

// ── State ──
let stats = null, currentClock = null, countdownInterval = null, gameState = 'loading';

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
  applyTheme();

  stats = loadStats();
  if (stats.pendingGame) {
    stats.totalGames++;
    stats.streak = 0;
    stats.pendingGame = null;
    saveStats(stats);
  }
  updateStatsBar();

  const now = Date.now();
  if (stats.lastGameTimestamp && (now - stats.lastGameTimestamp) < COOLDOWN_MS) {
    startWaiting(COOLDOWN_MS - (now - stats.lastGameTimestamp));
  } else {
    beginGame();
  }
});

// ── Begin game ──
function beginGame() {
  const hour   = Math.floor(Math.random() * 12) + 1;
  const minute = Math.floor(Math.random() * 60);
  currentClock = { hour, minute };
  stats.pendingGame = { hour, minute, startedAt: Date.now() };
  saveStats(stats);
  drawClock(hour, minute);
  document.getElementById('timeInput').value = '';
  showState('playing');
  setTimeout(() => document.getElementById('card').classList.add('visible'), 60);
  const inp = document.getElementById('timeInput');
  inp.focus();
  inp.onkeydown = e => { if (e.key === 'Enter') handleSubmit(); };
  inp.oninput = e => {
    let val = inp.value.replace(/[^0-9:]/g, '');
    // Auto-insert colon after 2 digits
    const digits = val.replace(/:/g, '');
    if (digits.length >= 2 && !val.includes(':')) {
      val = digits.slice(0, 2) + ':' + digits.slice(2, 4);
    }
    // Clamp to 5 chars (HH:MM)
    if (val.length > 5) val = val.slice(0, 5);
    inp.value = val;
  };
}

// ── Waiting ──
function startWaiting(remaining) {
  showState('waiting');
  document.getElementById('card').classList.add('visible');
  updateCountdown(remaining);
  countdownInterval = setInterval(() => {
    remaining -= 1000;
    if (remaining <= 0) {
      clearInterval(countdownInterval);
      stats = loadStats();
      beginGame();
    } else { updateCountdown(remaining); }
  }, 1000);
}

function updateCountdown(ms) {
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  document.getElementById('countdown').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

// ── Draw clock (theme-aware) ──
function drawClock(hour, minute) {
  const size = 260, cx = 130, cy = 130, r = 116;
  const svg  = document.getElementById('clockSvg');
  svg.innerHTML = '';

  // Read current theme colours from CSS vars
  const C = {
    face:    getVar('--clock-face'),
    faceG1:  getVar('--clock-face-g1'),
    faceG2:  getVar('--clock-face-g2'),
    border:  getVar('--clock-border'),
    tickMin: getVar('--clock-tick-min'),
    tickHr:  getVar('--clock-tick-hr'),
    nums:    getVar('--clock-nums'),
    handH:   getVar('--clock-hand-h'),
    handM:   getVar('--clock-hand-m'),
    center:  getVar('--clock-center'),
    cap:     getVar('--clock-cap'),
  };

  const ns = 'http://www.w3.org/2000/svg';
  function mk(tag, attrs) {
    const el = document.createElementNS(ns, tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }
  function pt(a, len) {
    const rad = (a - 90) * Math.PI / 180;
    return { x: cx + len * Math.cos(rad), y: cy + len * Math.sin(rad) };
  }

  // Defs
  const defs = mk('defs', {});
  const grad = mk('radialGradient', { id:'cg', cx:'50%', cy:'40%', r:'60%' });
  grad.appendChild(mk('stop', { offset:'0%',   'stop-color': C.faceG1 }));
  grad.appendChild(mk('stop', { offset:'100%', 'stop-color': C.faceG2 }));
  defs.appendChild(grad);
  svg.appendChild(defs);

  // Outer glow rings
  svg.appendChild(mk('circle', { cx, cy, r: r+10, fill:'none', stroke: C.border+'18', 'stroke-width':'10' }));
  svg.appendChild(mk('circle', { cx, cy, r: r+5,  fill:'none', stroke: C.border+'30', 'stroke-width':'3' }));

  // Face
  svg.appendChild(mk('circle', { cx, cy, r, fill: C.face, stroke: C.border, 'stroke-width':'2.5' }));
  svg.appendChild(mk('circle', { cx, cy, r: r-2, fill:'url(#cg)' }));

  // Minute ticks
  for (let i = 0; i < 60; i++) {
    if (i % 5 === 0) continue;
    const o = pt(i*6, r-4), inn = pt(i*6, r-11);
    svg.appendChild(mk('line', { x1:o.x, y1:o.y, x2:inn.x, y2:inn.y, stroke: C.tickMin, 'stroke-width':'1' }));
  }

  // Hour markers + numbers
  for (let i = 0; i < 12; i++) {
    const a = i * 30;
    const o = pt(a, r-4), inn = pt(a, r-18), np = pt(a, r-36);
    svg.appendChild(mk('line', { x1:o.x, y1:o.y, x2:inn.x, y2:inn.y, stroke: C.tickHr, 'stroke-width':'2.5', 'stroke-linecap':'round' }));
    const txt = mk('text', { x:np.x, y:np.y, 'text-anchor':'middle', 'dominant-baseline':'central',
      fill: C.nums, 'font-size':'13', 'font-family':"'Space Mono', monospace", 'font-weight':'700' });
    txt.textContent = i === 0 ? '12' : String(i);
    svg.appendChild(txt);
  }

  // Hands
  const hAngle = ((hour % 12) + minute/60) * 30;
  const mAngle = minute * 6;
  const hTip = pt(hAngle, r*0.52), mTip = pt(mAngle, r*0.74);

  const hHand = mk('line', { x1:cx, y1:cy, x2:hTip.x, y2:hTip.y, stroke: C.handH, 'stroke-width':'6', 'stroke-linecap':'round' });
  hHand.style.filter = isDark ? 'drop-shadow(0 0 4px #ffffff88)' : 'drop-shadow(0 2px 4px #00000033)';
  svg.appendChild(hHand);

  const mHand = mk('line', { x1:cx, y1:cy, x2:mTip.x, y2:mTip.y, stroke: C.handM, 'stroke-width':'4', 'stroke-linecap':'round' });
  mHand.style.filter = isDark ? 'drop-shadow(0 0 6px #00d4ffaa)' : 'drop-shadow(0 2px 6px #0088cc66)';
  svg.appendChild(mHand);

  svg.appendChild(mk('circle', { cx, cy, r:'8', fill: C.center }));
  svg.appendChild(mk('circle', { cx, cy, r:'4', fill: C.cap }));

  svg.style.filter = getVar('--clock-shadow');
}

// ── Submit ──
function handleSubmit() {
  if (!currentClock) return;
  const raw = document.getElementById('timeInput').value.trim().replace(/[.\s,]/g, ':');
  const parts = raw.split(':');
  let userHour, userMinute;
  if (parts.length === 2) {
    userHour = parseInt(parts[0],10); userMinute = parseInt(parts[1],10);
  } else if (/^\d{3,4}$/.test(raw)) {
    const d = raw.padStart(4,'0');
    userHour = parseInt(d.slice(0,2),10); userMinute = parseInt(d.slice(2),10);
  } else { shakeInput(); return; }

  if (isNaN(userHour)||isNaN(userMinute)||userHour<1||userHour>12||userMinute<0||userMinute>59) {
    shakeInput(); return;
  }

  const correct = userHour === currentClock.hour && userMinute === currentClock.minute;
  const fmt = (h,m) => `${pad(h)}:${pad(m)}`;
  stats.totalGames++;
  stats.lastGameTimestamp = Date.now();
  stats.pendingGame = null;
  if (correct) {
    stats.successCount++; stats.streak++;
    if (stats.streak > stats.bestStreak) stats.bestStreak = stats.streak;
  } else { stats.streak = 0; }
  saveStats(stats);
  updateStatsBar();
  showResult(correct, fmt(userHour, userMinute), fmt(currentClock.hour, currentClock.minute));
}

function shakeInput() {
  const inp = document.getElementById('timeInput');
  inp.classList.remove('error'); void inp.offsetWidth;
  inp.classList.add('error');
  setTimeout(() => inp.classList.remove('error'), 500);
}

// ── Show result ──
function showResult(correct, userAnswer, correctAnswer) {
  document.getElementById('resultEmoji').textContent = correct ? '✅' : '❌';
  document.getElementById('resultEmoji').className = `result-emoji ${correct?'correct':'wrong'}`;
  const title = document.getElementById('resultTitle');
  title.textContent = correct ? 'כל הכבוד! 🎉' : 'לא בדיוק...';
  title.className = `result-title ${correct?'correct':'wrong'}`;
  const detail = document.getElementById('resultDetail');
  detail.innerHTML = correct
    ? `השעה היתה <span class="mono correct">${correctAnswer}</span>`
    : `ענית <span class="mono wrong">${userAnswer}</span><br>השעה הנכונה: <span class="mono correct">${correctAnswer}</span>`;
  const sb = document.getElementById('streakBadge');
  if (correct && stats.streak > 1) { sb.textContent = `🔥 רצף של ${stats.streak}!`; sb.style.display='block'; }
  else sb.style.display='none';
  const bb = document.getElementById('bestBadge');
  if (correct && stats.streak === stats.bestStreak && stats.streak > 0) { bb.style.display='block'; bb.textContent='👑 שיא אישי חדש!'; }
  else bb.style.display='none';
  showState('result');
}

// ── Stats bar ──
function updateStatsBar() {
  document.getElementById('stat-streak').textContent = stats.streak;
  document.getElementById('stat-best').textContent   = stats.bestStreak;
  document.getElementById('stat-total').textContent  = stats.totalGames;
  const rate = stats.totalGames > 0 ? Math.round((stats.successCount/stats.totalGames)*100) : 0;
  document.getElementById('stat-rate').textContent   = rate + '%';
  document.getElementById('statsBar').style.visibility = 'visible';
}

function showState(name) {
  ['loading','waiting','playing','result'].forEach(s =>
    document.getElementById('state-'+s).style.display = (s===name)?'block':'none'
  );
  gameState = name;
}
</script>
